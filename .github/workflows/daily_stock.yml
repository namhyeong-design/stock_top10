name: Daily Stock Collection

on:
  schedule:
    # 평일 15:40 KST = UTC 06:40 (KST = UTC+9) — 장마감(15:30) 10분 후 수집
    - cron: '40 6 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼 활성화

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 강제 적용

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock collection
        env:
          HIT_UPPER_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          HIT_UPPER_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_stocks.py
